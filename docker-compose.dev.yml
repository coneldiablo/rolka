services:
  app:
    build:
      context: .
      target: dev
    command: sh -c "npx prisma generate && npx prisma db push && npm run dev:docker"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-rolka}?schema=public
      REDIS_URL: redis://redis:6379
      APP_URL: http://localhost:3000
      TELEGRAM_MINI_APP_URL: http://localhost:3000
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: .
      target: dev
    command: npm run bot:polling
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-rolka}?schema=public
      REDIS_URL: redis://redis:6379
      APP_URL: http://localhost:3000
      TELEGRAM_MINI_APP_URL: http://localhost:3000
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      app:
        condition: service_started

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    stop_grace_period: 60s
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - checkpoint_timeout=10min
      - -c
      - max_wal_size=1GB
      - -c
      - wal_compression=on
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rolka}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rolka}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  node_modules:
  next_cache:
  postgres_data:
  redis_data:
