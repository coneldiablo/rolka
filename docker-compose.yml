services:
  app:
    build:
      context: .
      target: dev
    command: sh -c "npx prisma generate && npx prisma db push && npm run dev:docker"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/rolka?schema=public
      REDIS_URL: redis://redis:6379
      APP_URL: http://localhost:3000
      TELEGRAM_MINI_APP_URL: http://localhost:3000
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: .
      target: dev
    command: npm run bot:polling
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/rolka?schema=public
      REDIS_URL: redis://redis:6379
      APP_URL: http://localhost:3000
      TELEGRAM_MINI_APP_URL: http://localhost:3000
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      app:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rolka
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rolka"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  node_modules:
  next_cache:
  postgres_data:
  redis_data:
