name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  NEXT_TELEMETRY_DISABLED: "1"
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rolka_ci?schema=public
  REDIS_URL: redis://localhost:6379
  APP_URL: http://localhost:3000
  TELEGRAM_MINI_APP_URL: http://localhost:3000
  TELEGRAM_BOT_TOKEN: "123456:test-token"
  AI_DEFAULT_TEXT_PROVIDER: aitunnel
  AI_DEFAULT_IMAGE_PROVIDER: gemini

jobs:
  quality:
    name: Quality, tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rolka_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rolka_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit high severity dependencies
        run: npm audit --audit-level=high

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Apply database migrations
        run: npm run prisma:deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Validate Docker Compose files
        run: |
          cp .env.example .env
          docker compose config --quiet
          docker compose -f docker-compose.dev.yml config --quiet

      - name: Validate shell scripts
        run: sh -n scripts/db-backup.sh
